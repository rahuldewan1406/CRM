# DIC-NHAI CRM — Nginx Configuration
# Domain: nhaidevelopment.dic.org.in
# Path:   /CRM (login at /CRM/)

server {
    listen 80;
    listen [::]:80;
    server_name nhaidevelopment.dic.org.in;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nhaidevelopment.dic.org.in;

    # ── SSL Certificates (Let's Encrypt via Certbot) ────────────────
    ssl_certificate     /etc/letsencrypt/live/nhaidevelopment.dic.org.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nhaidevelopment.dic.org.in/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/nhaidevelopment.dic.org.in/chain.pem;

    # ── SSL Hardening ────────────────────────────────────────────────
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:50m;
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            8.8.8.8 8.8.4.4 valid=300s;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── Security Headers ─────────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"                    always;
    add_header X-Content-Type-Options   "nosniff"                       always;
    add_header X-XSS-Protection         "1; mode=block"                 always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy  "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none';" always;

    # ── Logging ──────────────────────────────────────────────────────
    access_log /var/log/nginx/nhai-crm-access.log;
    error_log  /var/log/nginx/nhai-crm-error.log warn;

    # ── Static frontend — served from /CRM/ ─────────────────────────
    location /CRM/ {
        alias /var/www/nhai-crm/;
        index index.html;
        try_files $uri $uri/ /CRM/index.html;

        # Cache static assets aggressively
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
            alias /var/www/nhai-crm/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # No cache for HTML (always check for updates)
        location ~* \.html$ {
            alias /var/www/nhai-crm/;
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # ── API proxy → Express (port 3002) ─────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3002/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;

        # Rate limit API endpoints
        limit_req zone=api_limit burst=20 nodelay;
    }

    # ── SMTP proxy → SMTP server (port 3001) ────────────────────────
    location /smtp/ {
        proxy_pass       http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 15s;
    }

    # ── Block common attack vectors ──────────────────────────────────
    location ~* \.(env|git|sql|bak|log|json)$ { return 404; }
    location ~ /\.                             { return 404; }
    location = /favicon.ico                    { log_not_found off; access_log off; try_files $uri =204; }
    location = /robots.txt                     { return 200 "User-agent: *\nDisallow: /api/\n"; }

    # ── Redirect root to /CRM/ ───────────────────────────────────────
    location = / { return 301 https://$host/CRM/; }
}

# Rate limiting zone (define in http block of nginx.conf or include here)
# Add to /etc/nginx/nginx.conf http{} block:
# limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
